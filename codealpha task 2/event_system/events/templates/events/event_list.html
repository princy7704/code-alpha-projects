<!DOCTYPE html>
<html>
<head>
    <title>Event List</title>
</head>
<body>

<h1>My Registered Events</h1>

{% for event in events %}
    <div style="border:1px solid black; padding:10px; margin:10px;">
        <h2>{{ event.title }}</h2>
        <p>{{ event.description }}</p>
        <p>Date: {{ event.date }}</p>
        <p>Location: {{ event.location }}</p>

        <a href="/register/{{ event.id }}/">
            <button>Register</button>
        </a>
    </div>
{% endfor %}

</body>
</html>
